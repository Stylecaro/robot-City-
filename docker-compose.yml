version: '3.8'

services:
  # ─── Base de Datos MongoDB ─────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: ciudad-robot-db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-robotcity}
      MONGO_INITDB_DATABASE: ciudad_robot
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - ciudad-robot-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ciudad-robot-cache
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ciudad-robot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API (Node.js) ─────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ciudad-robot-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: mongodb://root:${MONGO_PASSWORD:-robotcity}@mongodb:27017/ciudad_robot?authSource=admin
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ciudad-robot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── AI Engine (Python/FastAPI) ────────────────────────────────
  ai-engine:
    build:
      context: .
      dockerfile: ai-engine/Dockerfile
    container_name: ciudad-robot-ai
    restart: always
    ports:
      - "8765:8765"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: mongodb://root:${MONGO_PASSWORD:-robotcity}@mongodb:27017/ciudad_robot?authSource=admin
      REDIS_URL: redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ciudad-robot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (React + Vite → Nginx) ──────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ciudad-robot-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ciudad-robot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ciudad-robot-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - ciudad-robot-network

  # ─── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: ciudad-robot-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-ciudadrobot}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - ciudad-robot-network

  # ─── MongoDB Exporter ──────────────────────────────────────────
  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    container_name: ciudad-robot-mongo-exporter
    restart: always
    ports:
      - "9216:9216"
    environment:
      MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-robotcity}@mongodb:27017/admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ciudad-robot-network

  # ─── Redis Exporter ────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: ciudad-robot-redis-exporter
    restart: always
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ciudad-robot-network

  # ─── Robot Médico ─────────────────────────────────────────────
  robot-medico:
    build:
      context: .
      dockerfile: service-robots/Dockerfile
    container_name: ciudad-robot-medico
    restart: always
    command: python medical_robot.py
    ports:
      - "8001:8001"
    environment:
      PYTHONUNBUFFERED: 1
      ROBOT_NAME: medical
      ROBOT_PORT: 8001
    networks:
      - ciudad-robot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Robot Policía ────────────────────────────────────────────
  robot-policia:
    build:
      context: .
      dockerfile: service-robots/Dockerfile
    container_name: ciudad-robot-policia
    restart: always
    command: python security_robot.py
    ports:
      - "8002:8002"
    environment:
      PYTHONUNBUFFERED: 1
      ROBOT_NAME: security
      ROBOT_PORT: 8002
    networks:
      - ciudad-robot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Robot Transporte ─────────────────────────────────────────
  robot-transporte:
    build:
      context: .
      dockerfile: service-robots/Dockerfile
    container_name: ciudad-robot-transporte
    restart: always
    command: python transport_robot.py
    ports:
      - "8003:8003"
    environment:
      PYTHONUNBUFFERED: 1
      ROBOT_NAME: transport
      ROBOT_PORT: 8003
    networks:
      - ciudad-robot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Robot Comerciante ────────────────────────────────────────
  robot-comerciante:
    build:
      context: .
      dockerfile: service-robots/Dockerfile
    container_name: ciudad-robot-comerciante
    restart: always
    command: python commerce_robot.py
    ports:
      - "8004:8004"
    environment:
      PYTHONUNBUFFERED: 1
      ROBOT_NAME: commerce
      ROBOT_PORT: 8004
    networks:
      - ciudad-robot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Robot Constructor ────────────────────────────────────────
  robot-constructor:
    build:
      context: .
      dockerfile: service-robots/Dockerfile
    container_name: ciudad-robot-constructor
    restart: always
    command: python builder_robot.py
    ports:
      - "8005:8005"
    environment:
      PYTHONUNBUFFERED: 1
      ROBOT_NAME: builder
      ROBOT_PORT: 8005
    networks:
      - ciudad-robot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Robot Maestro ────────────────────────────────────────────
  robot-maestro:
    build:
      context: .
      dockerfile: service-robots/Dockerfile
    container_name: ciudad-robot-maestro
    restart: always
    command: python teacher_robot.py
    ports:
      - "8006:8006"
    environment:
      PYTHONUNBUFFERED: 1
      ROBOT_NAME: teacher
      ROBOT_PORT: 8006
    networks:
      - ciudad-robot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ciudad-robot-network:
    driver: bridge
