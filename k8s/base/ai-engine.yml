---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: ciudad-robot
  labels:
    app: ai-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8765"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ai-engine
          image: ciudad-robot/ai-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8765
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ciudad-robot-secrets
                  key: MONGO_PASSWORD
            - name: DATABASE_URL
              value: "mongodb://root:$(MONGO_PASSWORD)@mongodb:27017/ciudad_robot?authSource=admin"
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /status
              port: 8765
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /status
              port: 8765
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
  namespace: ciudad-robot
spec:
  selector:
    app: ai-engine
  ports:
    - port: 8765
      targetPort: 8765
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-engine-hpa
  namespace: ciudad-robot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-engine
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
