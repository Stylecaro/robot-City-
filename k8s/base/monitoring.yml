---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ciudad-robot
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          ports:
            - containerPort: 9090
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.retention.time=30d'
            - '--web.enable-lifecycle'
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: ciudad-robot
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ciudad-robot
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: "backend-node"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["ciudad-robot"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: backend
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            target_label: __address__
            regex: (.+)
            replacement: ${1}
            action: replace
        metrics_path: /metrics
      - job_name: "ai-engine-python"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["ciudad-robot"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: ai-engine
            action: keep
        metrics_path: /metrics
      - job_name: "mongodb-exporter"
        static_configs:
          - targets: ["mongodb-exporter:9216"]
      - job_name: "redis-exporter"
        static_configs:
          - targets: ["redis-exporter:9121"]
  alerts.yml: |
    groups:
      - name: ciudad_robot_alerts
        rules:
          - alert: HighErrorRate
            expr: rate(http_requests_total{status_code=~"5.."}[5m]) > 0.1
            for: 5m
            labels:
              severity: critical
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: ciudad-robot
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ciudad-robot-secrets
                  key: GRAFANA_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
      volumes:
        - name: grafana-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: ciudad-robot
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
