<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Constructor 🏗️</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      min-height: 100vh;
      color: #e6edf3;
    }
    header {
      background: rgba(22,27,34,0.95);
      border-bottom: 1px solid #30363d;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header .icon { font-size: 2.5rem; }
    header h1 { font-size: 1.8rem; color: #58a6ff; }
    header p { color: #8b949e; font-size: 0.9rem; }
    .status-bar {
      background: rgba(35, 134, 54, 0.15);
      border-bottom: 1px solid rgba(35,134,54,0.3);
      padding: 10px 40px;
      color: #3fb950;
      font-size: 0.9rem;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 40px; }
    .section { margin-bottom: 32px; }
    .section h2 { font-size: 1.2rem; color: #e6edf3; margin-bottom: 16px; border-left: 3px solid #58a6ff; padding-left: 10px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.85rem; color: #8b949e; }
    input, select, textarea {
      background: rgba(22,27,34,0.8);
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: #58a6ff; }
    textarea { resize: vertical; min-height: 70px; }
    select option { background: #161b22; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s, transform 0.1s;
      margin-right: 10px;
      margin-top: 4px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-info { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid rgba(88,166,255,0.3); }
    .btn-info:hover { background: rgba(88,166,255,0.25); }
    .progress-bar-wrap {
      background: #30363d;
      border-radius: 10px;
      height: 12px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-bar { background: #238636; height: 100%; transition: width 0.4s; }
    .result-box {
      background: rgba(22,27,34,0.8);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
      font-size: 0.85rem;
      line-height: 1.6;
      display: none;
    }
    .result-box pre { white-space: pre-wrap; word-break: break-word; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="icon">🏗️</div>
    <div>
      <h1>Robot Constructor</h1>
      <p>Puerto 8005 · Gestión de Proyectos de Construcción · <a href="/docs">API Docs</a> · <a href="/web/index.html">← Inicio</a></p>
    </div>
  </header>
  <div class="status-bar" id="statusBar">⬤ &nbsp;Verificando estado del robot…</div>

  <div class="container">
    <!-- Crear Proyecto -->
    <div class="section">
      <h2>🏗️ Crear Proyecto de Construcción</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre del proyecto</label>
          <input type="text" id="proj-name" placeholder="Ej: Edificio Solar Norte" />
        </div>
        <div class="form-group">
          <label>Tipo de proyecto</label>
          <select id="proj-type">
            <option value="residential">Residencial</option>
            <option value="commercial">Comercial</option>
            <option value="infrastructure">Infraestructura</option>
            <option value="industrial">Industrial</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ubicación</label>
          <input type="text" id="proj-location" placeholder="Ciudad, dirección" />
        </div>
        <div class="form-group">
          <label>Presupuesto (€)</label>
          <input type="number" id="proj-budget" placeholder="Ej: 500000" min="0" />
        </div>
        <div class="form-group">
          <label>Fecha de inicio</label>
          <input type="date" id="proj-date" />
        </div>
        <div class="form-group">
          <label>Nombre del cliente</label>
          <input type="text" id="proj-client" placeholder="Empresa o persona" />
        </div>
        <div class="form-group full">
          <label>Descripción del proyecto</label>
          <textarea id="proj-desc" placeholder="Detalles del proyecto de construcción…"></textarea>
        </div>
      </div>
      <button class="btn btn-primary" onclick="createProject()">🏗️ Crear Proyecto</button>
      <button class="btn btn-info" onclick="listProjects()">📋 Ver Proyectos Activos</button>
      <div class="result-box" id="proj-result"><pre id="proj-result-text"></pre></div>
    </div>

    <!-- Actualizar Progreso -->
    <div class="section">
      <h2>📊 Actualizar Progreso</h2>
      <div class="form-grid">
        <div class="form-group full">
          <label>ID del proyecto</label>
          <input type="text" id="upd-id" placeholder="Pega el ID del proyecto" />
        </div>
        <div class="form-group full">
          <label>Progreso: <span id="progress-label">50</span>%</label>
          <input type="range" id="upd-progress" min="0" max="100" value="50" oninput="document.getElementById('progress-label').textContent=this.value" />
          <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:50%"></div></div>
        </div>
        <div class="form-group full">
          <label>Notas de actualización</label>
          <textarea id="upd-notes" placeholder="Describe el avance del proyecto…"></textarea>
        </div>
      </div>
      <button class="btn btn-primary" onclick="updateProgress()">📊 Actualizar Progreso</button>
      <div class="result-box" id="upd-result"><pre id="upd-result-text"></pre></div>
    </div>
  </div>

  <script>
    const API = '';

    document.getElementById('upd-progress').addEventListener('input', function() {
      document.getElementById('progress-bar').style.width = this.value + '%';
    });

    async function checkStatus() {
      try {
        const r = await fetch(API + '/health');
        const d = await r.json();
        document.getElementById('statusBar').innerHTML =
          `⬤ &nbsp;Robot Constructor: <strong>${d.status}</strong> · ${new Date(d.timestamp).toLocaleString('es')}`;
        document.getElementById('statusBar').style.color = '#3fb950';
      } catch {
        document.getElementById('statusBar').textContent = '⬤  Robot Constructor: desconectado';
        document.getElementById('statusBar').style.color = '#f85149';
      }
    }

    async function createProject() {
      const body = {
        project_name: document.getElementById('proj-name').value,
        project_type: document.getElementById('proj-type').value,
        location: document.getElementById('proj-location').value,
        budget: parseFloat(document.getElementById('proj-budget').value) || 0,
        start_date: document.getElementById('proj-date').value,
        description: document.getElementById('proj-desc').value,
        client_name: document.getElementById('proj-client').value,
      };
      try {
        const r = await fetch(API + '/api/builder/project', {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
        });
        const d = await r.json();
        if (d.project?.id) document.getElementById('upd-id').value = d.project.id;
        showResult('proj', d);
      } catch (e) { showResult('proj', {error: e.message}); }
    }

    async function listProjects() {
      try {
        const r = await fetch(API + '/api/builder/projects');
        showResult('proj', await r.json());
      } catch (e) { showResult('proj', {error: e.message}); }
    }

    async function updateProgress() {
      const id = document.getElementById('upd-id').value.trim();
      if (!id) return alert('Introduce un ID de proyecto');
      const body = {
        progress_percent: parseInt(document.getElementById('upd-progress').value),
        notes: document.getElementById('upd-notes').value,
      };
      try {
        const r = await fetch(API + `/api/builder/project/${id}/progress`, {
          method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
        });
        showResult('upd', await r.json());
      } catch (e) { showResult('upd', {error: e.message}); }
    }

    function showResult(prefix, data) {
      const box = document.getElementById(prefix + '-result');
      document.getElementById(prefix + '-result-text').textContent = JSON.stringify(data, null, 2);
      box.style.display = 'block';
    }

    checkStatus();
    setInterval(checkStatus, 30000);
  </script>
</body>
</html>
