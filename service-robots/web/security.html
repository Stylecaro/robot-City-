<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Policía 🚔</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      min-height: 100vh;
      color: #e6edf3;
    }
    header {
      background: rgba(22,27,34,0.95);
      border-bottom: 1px solid #30363d;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header .icon { font-size: 2.5rem; }
    header h1 { font-size: 1.8rem; color: #58a6ff; }
    header p { color: #8b949e; font-size: 0.9rem; }
    .status-bar {
      background: rgba(35, 134, 54, 0.15);
      border-bottom: 1px solid rgba(35,134,54,0.3);
      padding: 10px 40px;
      color: #3fb950;
      font-size: 0.9rem;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 40px; }
    .section { margin-bottom: 32px; }
    .section h2 { font-size: 1.2rem; color: #e6edf3; margin-bottom: 16px; border-left: 3px solid #58a6ff; padding-left: 10px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.85rem; color: #8b949e; }
    input, select, textarea {
      background: rgba(22,27,34,0.8);
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: #58a6ff; }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: #161b22; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-alert { background: #da3633; color: #fff; margin-right: 12px; }
    .btn-alert:hover { background: #f85149; }
    .btn-primary { background: #238636; color: #fff; margin-right: 12px; }
    .btn-primary:hover { background: #2ea043; }
    .btn-info { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid rgba(88,166,255,0.3); }
    .btn-info:hover { background: rgba(88,166,255,0.25); }
    .result-box {
      background: rgba(22,27,34,0.8);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
      font-size: 0.85rem;
      line-height: 1.6;
      display: none;
    }
    .result-box pre { white-space: pre-wrap; word-break: break-word; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="icon">🚔</div>
    <div>
      <h1>Robot Policía</h1>
      <p>Puerto 8002 · Seguridad y Patrullaje Robótico · <a href="/docs">API Docs</a> · <a href="/web/index.html">← Inicio</a></p>
    </div>
  </header>
  <div class="status-bar" id="statusBar">⬤ &nbsp;Verificando estado del robot…</div>

  <div class="container">
    <!-- Enviar Alerta -->
    <div class="section">
      <h2>🚨 Enviar Alerta de Seguridad</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Ubicación</label>
          <input type="text" id="alert-location" placeholder="Calle, número, barrio" />
        </div>
        <div class="form-group">
          <label>Tipo de alerta</label>
          <select id="alert-type">
            <option value="theft">Robo</option>
            <option value="vandalism">Vandalismo</option>
            <option value="accident">Accidente</option>
            <option value="fire">Incendio</option>
            <option value="suspicious">Actividad sospechosa</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tu nombre (opcional)</label>
          <input type="text" id="alert-reporter" placeholder="Nombre del testigo" />
        </div>
        <div class="form-group">
          <label>Teléfono de contacto</label>
          <input type="tel" id="alert-phone" placeholder="+34 600 000 000" />
        </div>
        <div class="form-group full">
          <label>Descripción</label>
          <textarea id="alert-desc" placeholder="Describe lo que estás viendo…"></textarea>
        </div>
      </div>
      <button class="btn btn-alert" onclick="sendAlert()">🚨 Enviar Alerta</button>
      <button class="btn btn-info" onclick="getPatrolStatus()">🗺️ Ver Estado de Patrulla</button>
      <div class="result-box" id="alert-result"><pre id="alert-result-text"></pre></div>
    </div>

    <!-- Reportar Incidente -->
    <div class="section">
      <h2>📋 Reportar Incidente</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Tipo de incidente</label>
          <select id="inc-type">
            <option value="robo">Robo</option>
            <option value="agresion">Agresión</option>
            <option value="accidente_trafico">Accidente de tráfico</option>
            <option value="disturbio">Disturbio público</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ubicación</label>
          <input type="text" id="inc-location" placeholder="Calle, número, ciudad" />
        </div>
        <div class="form-group">
          <label>Tu nombre (opcional)</label>
          <input type="text" id="inc-reporter" placeholder="Nombre del denunciante" />
        </div>
        <div class="form-group">
          <label>Teléfono de contacto</label>
          <input type="tel" id="inc-phone" placeholder="+34 600 000 000" />
        </div>
        <div class="form-group full">
          <label>Partes involucradas (opcional)</label>
          <input type="text" id="inc-parties" placeholder="Ej: Vehículo rojo, persona de azul" />
        </div>
        <div class="form-group full">
          <label>Descripción del incidente</label>
          <textarea id="inc-desc" placeholder="Describe el incidente con el mayor detalle posible…"></textarea>
        </div>
      </div>
      <button class="btn btn-primary" onclick="reportIncident()">📋 Enviar Reporte</button>
      <div class="result-box" id="inc-result"><pre id="inc-result-text"></pre></div>
    </div>
  </div>

  <script>
    const API = '';

    async function checkStatus() {
      try {
        const r = await fetch(API + '/health');
        const d = await r.json();
        document.getElementById('statusBar').innerHTML =
          `⬤ &nbsp;Robot Policía: <strong>${d.status}</strong> · ${new Date(d.timestamp).toLocaleString('es')}`;
        document.getElementById('statusBar').style.color = '#3fb950';
      } catch {
        document.getElementById('statusBar').textContent = '⬤  Robot Policía: desconectado';
        document.getElementById('statusBar').style.color = '#f85149';
      }
    }

    async function sendAlert() {
      const body = {
        location: document.getElementById('alert-location').value,
        alert_type: document.getElementById('alert-type').value,
        description: document.getElementById('alert-desc').value,
        reporter_name: document.getElementById('alert-reporter').value,
        contact_phone: document.getElementById('alert-phone').value,
      };
      try {
        const r = await fetch(API + '/api/security/alert', {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
        });
        showResult('alert', await r.json());
      } catch (e) { showResult('alert', {error: e.message}); }
    }

    async function getPatrolStatus() {
      try {
        const r = await fetch(API + '/api/security/patrol-status');
        showResult('alert', await r.json());
      } catch (e) { showResult('alert', {error: e.message}); }
    }

    async function reportIncident() {
      const body = {
        incident_type: document.getElementById('inc-type').value,
        location: document.getElementById('inc-location').value,
        description: document.getElementById('inc-desc').value,
        involved_parties: document.getElementById('inc-parties').value,
        reporter_name: document.getElementById('inc-reporter').value,
        contact_phone: document.getElementById('inc-phone').value,
      };
      try {
        const r = await fetch(API + '/api/security/report', {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
        });
        showResult('inc', await r.json());
      } catch (e) { showResult('inc', {error: e.message}); }
    }

    function showResult(prefix, data) {
      const box = document.getElementById(prefix + '-result');
      document.getElementById(prefix + '-result-text').textContent = JSON.stringify(data, null, 2);
      box.style.display = 'block';
    }

    checkStatus();
    setInterval(checkStatus, 30000);
  </script>
</body>
</html>
