<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Médico 🏥</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      min-height: 100vh;
      color: #e6edf3;
    }
    header {
      background: rgba(22,27,34,0.95);
      border-bottom: 1px solid #30363d;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header .icon { font-size: 2.5rem; }
    header h1 { font-size: 1.8rem; color: #58a6ff; }
    header p { color: #8b949e; font-size: 0.9rem; }
    .status-bar {
      background: rgba(35, 134, 54, 0.15);
      border-bottom: 1px solid rgba(35,134,54,0.3);
      padding: 10px 40px;
      color: #3fb950;
      font-size: 0.9rem;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 40px; }
    .section { margin-bottom: 32px; }
    .section h2 { font-size: 1.2rem; color: #e6edf3; margin-bottom: 16px; border-left: 3px solid #58a6ff; padding-left: 10px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.85rem; color: #8b949e; }
    input, select, textarea {
      background: rgba(22,27,34,0.8);
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: #58a6ff; }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: #161b22; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-emergency { background: #da3633; color: #fff; margin-right: 12px; }
    .btn-emergency:hover { background: #f85149; }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .result-box {
      background: rgba(22,27,34,0.8);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
      font-size: 0.85rem;
      line-height: 1.6;
      display: none;
    }
    .result-box pre { white-space: pre-wrap; word-break: break-word; }
    .severity-critical { color: #f85149; }
    .severity-high { color: #ffa657; }
    .severity-medium { color: #e3b341; }
    .severity-low { color: #3fb950; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="icon">🏥</div>
    <div>
      <h1>Robot Médico</h1>
      <p>Puerto 8001 · Asistencia Sanitaria Robótica · <a href="/docs">API Docs</a> · <a href="/web/index.html">← Inicio</a></p>
    </div>
  </header>
  <div class="status-bar" id="statusBar">⬤ &nbsp;Verificando estado del robot…</div>

  <div class="container">
    <!-- Emergencia -->
    <div class="section">
      <h2>🚑 Reportar Emergencia Médica</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre del paciente</label>
          <input type="text" id="emg-name" placeholder="Ej: Juan García" />
        </div>
        <div class="form-group">
          <label>Teléfono de contacto</label>
          <input type="tel" id="emg-phone" placeholder="+34 600 000 000" />
        </div>
        <div class="form-group">
          <label>Ubicación</label>
          <input type="text" id="emg-location" placeholder="Calle, número, ciudad" />
        </div>
        <div class="form-group">
          <label>Severidad</label>
          <select id="emg-severity">
            <option value="low">🟢 Baja</option>
            <option value="medium" selected>🟡 Media</option>
            <option value="high">🟠 Alta</option>
            <option value="critical">🔴 Crítica</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Descripción de la emergencia</label>
          <textarea id="emg-desc" placeholder="Describe los síntomas o situación de emergencia…"></textarea>
        </div>
      </div>
      <button class="btn btn-emergency" onclick="sendEmergency()">🚨 Reportar Emergencia</button>
      <div class="result-box" id="emg-result"><pre id="emg-result-text"></pre></div>
    </div>

    <!-- Cita Médica -->
    <div class="section">
      <h2>📅 Solicitar Cita Médica</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre del paciente</label>
          <input type="text" id="apt-name" placeholder="Ej: María López" />
        </div>
        <div class="form-group">
          <label>Tipo de médico</label>
          <select id="apt-doctor">
            <option value="General">Médico General</option>
            <option value="Cardiología">Cardiología</option>
            <option value="Pediatría">Pediatría</option>
            <option value="Neurología">Neurología</option>
            <option value="Urgencias">Urgencias</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fecha preferida</label>
          <input type="date" id="apt-date" />
        </div>
        <div class="form-group">
          <label>Teléfono de contacto</label>
          <input type="tel" id="apt-phone" placeholder="+34 600 000 000" />
        </div>
        <div class="form-group full">
          <label>Síntomas (opcional)</label>
          <textarea id="apt-symptoms" placeholder="Describe tus síntomas…"></textarea>
        </div>
      </div>
      <button class="btn btn-primary" onclick="bookAppointment()">📅 Solicitar Cita</button>
      <div class="result-box" id="apt-result"><pre id="apt-result-text"></pre></div>
    </div>
  </div>

  <script>
    const API = '';

    async function checkStatus() {
      try {
        const r = await fetch(API + '/health');
        const d = await r.json();
        document.getElementById('statusBar').innerHTML =
          `⬤ &nbsp;Robot Médico: <strong>${d.status}</strong> · Activo desde ${new Date(d.timestamp).toLocaleString('es')}`;
        document.getElementById('statusBar').style.background = 'rgba(35, 134, 54, 0.15)';
        document.getElementById('statusBar').style.color = '#3fb950';
      } catch {
        document.getElementById('statusBar').textContent = '⬤  Robot Médico: desconectado';
        document.getElementById('statusBar').style.background = 'rgba(218, 54, 51, 0.15)';
        document.getElementById('statusBar').style.color = '#f85149';
      }
    }

    async function sendEmergency() {
      const body = {
        patient_name: document.getElementById('emg-name').value,
        location: document.getElementById('emg-location').value,
        description: document.getElementById('emg-desc').value,
        severity: document.getElementById('emg-severity').value,
        contact_phone: document.getElementById('emg-phone').value,
      };
      try {
        const r = await fetch(API + '/api/medical/emergency', {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
        });
        const d = await r.json();
        showResult('emg', d);
      } catch (e) {
        showResult('emg', {error: e.message});
      }
    }

    async function bookAppointment() {
      const body = {
        patient_name: document.getElementById('apt-name').value,
        doctor_type: document.getElementById('apt-doctor').value,
        preferred_date: document.getElementById('apt-date').value,
        symptoms: document.getElementById('apt-symptoms').value,
        contact_phone: document.getElementById('apt-phone').value,
      };
      try {
        const r = await fetch(API + '/api/medical/appointment', {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
        });
        const d = await r.json();
        showResult('apt', d);
      } catch (e) {
        showResult('apt', {error: e.message});
      }
    }

    function showResult(prefix, data) {
      const box = document.getElementById(prefix + '-result');
      document.getElementById(prefix + '-result-text').textContent = JSON.stringify(data, null, 2);
      box.style.display = 'block';
    }

    checkStatus();
    setInterval(checkStatus, 30000);
  </script>
</body>
</html>
