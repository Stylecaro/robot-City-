<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Maestro 🎓</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      min-height: 100vh;
      color: #e6edf3;
    }
    header {
      background: rgba(22,27,34,0.95);
      border-bottom: 1px solid #30363d;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header .icon { font-size: 2.5rem; }
    header h1 { font-size: 1.8rem; color: #58a6ff; }
    header p { color: #8b949e; font-size: 0.9rem; }
    .status-bar {
      background: rgba(35, 134, 54, 0.15);
      border-bottom: 1px solid rgba(35,134,54,0.3);
      padding: 10px 40px;
      color: #3fb950;
      font-size: 0.9rem;
    }
    .container { max-width: 1000px; margin: 0 auto; padding: 40px; }
    .section { margin-bottom: 32px; }
    .section h2 { font-size: 1.2rem; color: #e6edf3; margin-bottom: 16px; border-left: 3px solid #58a6ff; padding-left: 10px; }
    .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .course-card {
      background: rgba(22,27,34,0.8);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .course-card:hover { border-color: #58a6ff; transform: translateY(-2px); }
    .course-card.selected { border-color: #3fb950; background: rgba(35,134,54,0.1); }
    .course-card .level {
      display: inline-block; border-radius: 10px; padding: 2px 8px; font-size: 0.75rem; margin-bottom: 8px;
    }
    .level-beginner { background: rgba(35,134,54,0.2); color: #3fb950; }
    .level-intermediate { background: rgba(255,166,87,0.2); color: #ffa657; }
    .level-advanced { background: rgba(248,81,73,0.2); color: #f85149; }
    .course-card h3 { font-size: 1rem; margin-bottom: 6px; }
    .course-card .meta { color: #8b949e; font-size: 0.8rem; margin-top: 6px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.85rem; color: #8b949e; }
    input, select {
      background: rgba(22,27,34,0.8);
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #58a6ff; }
    select option { background: #161b22; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s, transform 0.1s;
      margin-right: 10px;
      margin-top: 4px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-info { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid rgba(88,166,255,0.3); }
    .btn-info:hover { background: rgba(88,166,255,0.25); }
    .result-box {
      background: rgba(22,27,34,0.8);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
      font-size: 0.85rem;
      line-height: 1.6;
      display: none;
    }
    .result-box pre { white-space: pre-wrap; word-break: break-word; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="icon">🎓</div>
    <div>
      <h1>Robot Maestro</h1>
      <p>Puerto 8006 · Plataforma Educativa Robótica · <a href="/docs">API Docs</a> · <a href="/web/index.html">← Inicio</a></p>
    </div>
  </header>
  <div class="status-bar" id="statusBar">⬤ &nbsp;Verificando estado del robot…</div>

  <div class="container">
    <!-- Cursos -->
    <div class="section">
      <h2>📚 Cursos Disponibles</h2>
      <button class="btn btn-info" onclick="loadCourses()">🔄 Cargar Cursos</button>
      <button class="btn btn-info" onclick="loadCourses('beginner')">🟢 Principiante</button>
      <button class="btn btn-info" onclick="loadCourses('intermediate')">🟡 Intermedio</button>
      <button class="btn btn-info" onclick="loadCourses('advanced')">🔴 Avanzado</button>
      <div class="courses-grid" id="coursesGrid" style="margin-top:16px"></div>
    </div>

    <!-- Inscripción -->
    <div class="section">
      <h2>✏️ Inscribirse en un Curso</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Tu nombre</label>
          <input type="text" id="enr-name" placeholder="Nombre completo" />
        </div>
        <div class="form-group">
          <label>Email (opcional)</label>
          <input type="email" id="enr-email" placeholder="tu@email.com" />
        </div>
        <div class="form-group">
          <label>ID del curso</label>
          <input type="text" id="enr-course" placeholder="Ej: C001" />
        </div>
        <div class="form-group">
          <label>Nivel de experiencia</label>
          <select id="enr-level">
            <option value="beginner">Principiante</option>
            <option value="intermediate">Intermedio</option>
            <option value="advanced">Avanzado</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="enrollCourse()">🎓 Inscribirme</button>
      <div class="result-box" id="enr-result"><pre id="enr-result-text"></pre></div>
    </div>

    <!-- Ver Lección -->
    <div class="section">
      <h2>📖 Ver Lección</h2>
      <div class="form-grid">
        <div class="form-group full">
          <label>ID de la lección (ej: C001-L01, C002-L01, C003-L01)</label>
          <input type="text" id="lesson-id" placeholder="Ej: C001-L01" />
        </div>
      </div>
      <button class="btn btn-info" onclick="getLesson()">📖 Ver Lección</button>
      <div class="result-box" id="lesson-result"><pre id="lesson-result-text"></pre></div>
    </div>
  </div>

  <script>
    const API = '';

    async function checkStatus() {
      try {
        const r = await fetch(API + '/health');
        const d = await r.json();
        document.getElementById('statusBar').innerHTML =
          `⬤ &nbsp;Robot Maestro: <strong>${d.status}</strong> · ${new Date(d.timestamp).toLocaleString('es')}`;
        document.getElementById('statusBar').style.color = '#3fb950';
      } catch {
        document.getElementById('statusBar').textContent = '⬤  Robot Maestro: desconectado';
        document.getElementById('statusBar').style.color = '#f85149';
      }
    }

    async function loadCourses(level) {
      try {
        const url = level ? `/api/teacher/courses?level=${level}` : '/api/teacher/courses';
        const r = await fetch(API + url);
        const d = await r.json();
        const grid = document.getElementById('coursesGrid');
        grid.innerHTML = '';
        d.courses.forEach(c => {
          const card = document.createElement('div');
          card.className = 'course-card';
          const lvlClass = `level-${c.level}`;
          const lvlLabel = {beginner:'Principiante', intermediate:'Intermedio', advanced:'Avanzado'}[c.level] || c.level;
          card.innerHTML = `
            <span class="level ${lvlClass}">${lvlLabel}</span>
            <h3>${c.title}</h3>
            <div class="meta">⏱ ${c.duration_hours}h · 👥 ${c.enrolled} estudiantes · 🤖 ${c.instructor}</div>
            <div class="meta" style="margin-top:6px">ID: <strong>${c.id}</strong></div>
          `;
          card.onclick = () => {
            document.querySelectorAll('.course-card').forEach(x => x.classList.remove('selected'));
            card.classList.add('selected');
            document.getElementById('enr-course').value = c.id;
            document.getElementById('lesson-id').value = c.id + '-L01';
          };
          grid.appendChild(card);
        });
      } catch (e) { alert('Error cargando cursos: ' + e.message); }
    }

    async function enrollCourse() {
      const body = {
        student_name: document.getElementById('enr-name').value,
        course_id: document.getElementById('enr-course').value,
        email: document.getElementById('enr-email').value,
        experience_level: document.getElementById('enr-level').value,
      };
      try {
        const r = await fetch(API + '/api/teacher/enroll', {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)
        });
        showResult('enr', await r.json());
      } catch (e) { showResult('enr', {error: e.message}); }
    }

    async function getLesson() {
      const id = document.getElementById('lesson-id').value.trim();
      if (!id) return alert('Introduce un ID de lección');
      try {
        const r = await fetch(API + `/api/teacher/lesson/${id}`);
        showResult('lesson', await r.json());
      } catch (e) { showResult('lesson', {error: e.message}); }
    }

    function showResult(prefix, data) {
      const box = document.getElementById(prefix + '-result');
      document.getElementById(prefix + '-result-text').textContent = JSON.stringify(data, null, 2);
      box.style.display = 'block';
    }

    checkStatus();
    loadCourses();
    setInterval(checkStatus, 30000);
  </script>
</body>
</html>
